<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style2.css" rel="stylesheet"
    />
    <fieldset>
    <legend>
    <title> Registration Form</title>
    </legend>
    
</head>
<body>
    <h1 style="text-align: center;">REGISTRATION&nbsp;&nbsp;&nbsp;FORM</h1>



    <form  action="/submit" method="post">


    <br><br>
        <label for ="name"><i>NAME :</i></label>
        <input type="text" id="name"  placeholder="Enter your name" name="name" required><br><br><br><br>



        <label for="email"><i>EMAIL :</i></label>
        <input type="email" id="email" placeholder="Enter your email" name="email" required><br><br><br><br>



         <label for="gender"><i>GENDER :</i></label><br>
         
        <input type="radio" id="male" name="gender" value="male" required>     
<label for="male">male</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">female</label><br><br><br><br>

    

    <label for="date"><i>DATE OF BIRTH :</i></label>
    <input type="date" id="date" name="date of birth" required><br><br><br><br>
    


    <label for="Department"><I>DEPARTMENT :</I></label>:</label>
<select id="department"  placeholder="select your department" name="department" required>
<option value=" ">select your branch</option>
<option value="CSE">CSE</option>
<option value="AI">AI</option>
<option value="ECE">ECE</option>
<option value="DS">DS</option>
<option value="IT">IT</option>
<option value="CIVIL">CIVIL</option>
</select><BR><BR><br><br>


     <label for="password"><I>PASSWORD :</I></label>
    <input type="password" id="password" placeholder="Enter your password" name="password" required><br><br><br><br>


    <label for="confirm password"><I>CONFIRM PASSWORD :</I></label>
    <input type="confirm password" id="confirm password" placeholder="Enter your confirm password" name="confirm password" required><br><br><br><br>


    <label for="phone"><I>PHONE NUMBER :</I></label>
    <input type="tel" id="phone" name="phone" placeholder="+1-555-555-5555" required><br><br><br><br>


<button type="submit">SUBMIT</button>

</form>
</body>
</html>..................day2(html code)
